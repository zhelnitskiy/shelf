name: ${COMPOSE_PROJECT_NAME:-shelf}

services:
  app:
    build:
      context: .
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - laravel_bootstrap_cache:/var/www/bootstrap/cache
      - laravel_storage_framework:/var/www/storage/framework
      - laravel_storage_logs:/var/www/storage/logs
      - laravel_storage_api_docs:/var/www/storage/api-docs
    depends_on:
      - mysql

  nginx:
    image: nginx:stable-alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - laravel_storage_api_docs:/var/www/storage/api-docs
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h 127.0.0.1 -uroot --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  laravel_bootstrap_cache:
  laravel_storage_framework:
  laravel_storage_logs:
  laravel_storage_api_docs:
  mysql_data:
